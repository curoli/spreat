<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Spreat - the chain reactive game</title>
        <script src="public/javascripts/d3.js"></script>
        <script src="src/game/board.js"></script>
        <script src="src/game/players.js"></script>
        <script src="src/game/rules.js"></script>
        <script src="src/ui/renderBoard.js"></script>
        <script src="src/ui/renderAtoms.js"></script>
        <script src="src/ui/interaction.js"></script>
        <script src="src/main.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                window.SpreatApp.boot();
            });
        </script>
    </head>
    <body>
        <h1>Spreat - the chain reactive game</h1>
        <p>
            <label>
                Board size
                <select data-role="board-size">
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5" selected>5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </label>
            <label>
                Players
                <select data-role="player-count">
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </label>
        </p>
        <p data-role="player-types"></p>
        <p data-role="status"></p>
        <p data-role="roster"></p>
        <p>
            <button type="button" data-role="reset">New game</button>
        </p>
        <svg width="500" height="300"></svg>
    </body>
</html>
